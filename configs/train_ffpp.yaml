# Data
data_dir: "./data/processed/train"
val_data_dir: "./data/processed/test"
sequence_length: 5 # Number of frames per video to process in sequence
image_size: 224

# Training
batch_size: 8
epochs: 30
learning_rate: 0.0002
weight_decay: 0.0001
focal_gamma: 2.0

# Hardware
device: "cuda"
num_workers: 6